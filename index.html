<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OmOi chat</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #0078d4; --bg: #0a0a0a; --accent: #00f0ff; --danger: #d11a2a; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* 起動画面 */
        #splash { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s; }
        .loader { border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ログイン */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .modal { background: #1e1e1e; padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--primary); }
        .modal h1 { color: var(--accent); margin-bottom: 20px; }
        .modal input { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
        
        /* 先生モード切り替え */
        .mode-switch { margin: 15px 0; font-size: 13px; color: #aaa; cursor: pointer; display: inline-block; }
        #teacher-pw-area { display: none; margin-top: 10px; padding: 10px; border: 1px dashed var(--gold); border-radius: 8px; }

        /* メインUI */
        .top-nav { height: 65px; background: #252525; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #333; }
        .controls { display: flex; gap: 8px; background: #333; padding: 6px; border-radius: 10px; }
        .btn { background: none; border: none; color: white; padding: 8px 12px; cursor: pointer; border-radius: 6px; font-size: 11px; display: flex; flex-direction: column; align-items: center; min-width: 50px; }
        .btn.on { background: var(--primary); }
        .btn.admin { background: var(--danger); border: 1px solid var(--gold); font-weight: bold; }

        .main-content { flex: 1; display: flex; overflow: hidden; }
        #video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; align-content: start; }
        .video-box { position: relative; aspect-ratio: 16/9; background: #222; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .u-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        /* サイドパネル */
        .side-panel { width: 320px; background: #161616; border-left: 1px solid #333; display: flex; flex-direction: column; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; }
        .chat-in { padding: 15px; background: #222; display: flex; gap: 8px; }

        .vol-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--accent); transition: width 0.1s; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="font-size: 3rem; color: var(--accent); margin: 0; letter-spacing: 2px;">OmOi chat</h1>
    <div class="loader"></div>
</div>

<div id="login-overlay" class="overlay" style="display:none;">
    <div class="modal">
        <h1>OmOi chat</h1>
        <input type="text" id="class-code" placeholder="クラスコード (例: 7-3)">
        <input type="text" id="u-name" placeholder="名前">
        
        <div class="mode-switch" onclick="toggleTeacherInput()">🛠️ 先生モードはこちら</div>
        <div id="teacher-pw-area">
            <input type="password" id="teacher-pw" placeholder="先生用パスワード">
            <p style="font-size:10px; color:var(--gold); margin:0;">※パスワードを入力すると管理権限がつきます</p>
        </div>

        <button class="btn on" style="width:100%; height:50px; font-size:18px; margin-top:20px;" onclick="start()">入室する</button>
    </div>
</div>

<div class="top-nav">
    <div class="controls">
        <button id="mic-btn" class="btn on" onclick="toggleMic()">🎤<span>マイク</span></button>
        <button id="cam-btn" class="btn on" onclick="toggleCam()">📷<span>カメラ</span></button>
        <button class="btn" onclick="shareScreen()">🖥️<span>共有</span></button>
    </div>
    
    <div id="teacher-tools" class="controls" style="display:none; border: 1px solid var(--gold);">
        <button class="btn admin" onclick="masterOff()">🚫<span>全員一斉停止</span></button>
        <span style="color:var(--gold); font-size:10px; align-self:center; margin-left:5px;">先生</span>
    </div>

    <div style="margin-left:auto; display:flex; gap:15px; align-items:center;">
        <div id="room-info" style="font-size:12px; color:var(--accent);"></div>
        <button class="btn" style="background:var(--danger);" onclick="location.reload()">🚪<span>退出</span></button>
    </div>
</div>

<div class="main-content">
    <div id="video-grid">
        <div class="video-box" id="local-box">
            <video id="local-vid" autoplay muted playsinline></video>
            <div class="u-tag">自分</div>
            <div id="local-vol" class="vol-bar"></div>
        </div>
    </div>
    <div class="side-panel">
        <div id="chat-msgs"></div>
        <div class="chat-in">
            <input type="text" id="chat-input" placeholder="メッセージ..." style="flex:1; background:#000; color:white; border:1px solid #444; border-radius:5px; padding:5px;">
            <button onclick="sendMsg()" class="btn on" style="min-width:40px;">送</button>
        </div>
    </div>
</div>

<script>
    let peer, myStream, conns = {}, currentUser, isTeacher = false;

    // 起動アニメーション
    window.onload = () => {
        setTimeout(() => {
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(() => {
                s.style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }, 800);
        }, 1500);
    };

    function toggleTeacherInput() {
        const area = document.getElementById('teacher-pw-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    async function start() {
        const name = document.getElementById('u-name').value;
        const code = document.getElementById('class-code').value;
        const pw = document.getElementById('teacher-pw').value;
        
        if(!name || !code) return alert("名前とクラスコードを入力してください");

        // パスワード判定
        if(pw === "teacher") {
            isTeacher = true;
            document.getElementById('teacher-tools').style.display = 'flex';
        } else if(pw !== "") {
            alert("パスワードが違います。一般ユーザーとして入室します。");
        }

        currentUser = { name, code };
        document.getElementById('room-info').textContent = `Room: ${code} | ${name}`;

        myStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        document.getElementById('local-vid').srcObject = myStream;
        document.getElementById('login-overlay').style.display = 'none';

        // 自動接続用ID
        peer = new Peer(`omoi-${code}-${name}`);

        peer.on('open', id => {
            monitorAudio(myStream, 'local-vol', 'local-box');
            addChat("システム", `${name}さんが入室しました`);
        });

        peer.on('call', call => { call.answer(myStream); handleCall(call); });
        peer.on('connection', conn => handleData(conn));
    }

    // 先生専用：全員のデバイスをオフにする
    function masterOff() {
        if(!isTeacher) return;
        if(confirm("全員のマイクとカメラを強制オフにしますか？")) {
            Object.values(conns).forEach(c => c.send({type: 'master-off'}));
            addChat("先生", "全員のデバイスを停止しました。");
        }
    }

    function handleData(conn) {
        conns[conn.peer] = conn;
        conn.on('data', d => {
            if(d.type === 'msg') addChat(d.name, d.val);
            if(d.type === 'master-off') {
                // 生徒側の処理
                myStream.getTracks().forEach(t => t.enabled = false);
                document.getElementById('mic-btn').classList.remove('on');
                document.getElementById('cam-btn').classList.remove('on');
                addChat("🚨システム", "先生が全員のマイクとカメラをオフにしました。");
            }
        });
    }

    function handleCall(call) {
        call.on('stream', s => {
            if(document.getElementById(`v-${call.peer}`)) return;
            const div = document.createElement('div');
            div.className = 'video-box'; div.id = `v-${call.peer}`;
            div.innerHTML = `<video id="vid-${call.peer}" autoplay playsinline></video><div class="u-tag">${call.peer.split('-').pop()}</div><div id="vol-${call.peer}" class="vol-bar"></div>`;
            document.getElementById('video-grid').appendChild(div);
            document.getElementById(`vid-${call.peer}`).srcObject = s;
            monitorAudio(s, `vol-${call.peer}`, `v-${call.peer}`);
        });
    }

    function sendMsg() {
        const val = document.getElementById('chat-input').value;
        if(!val) return;
        addChat(currentUser.name, val);
        Object.values(conns).forEach(c => c.send({type:'msg', name:currentUser.name, val}));
        document.getElementById('chat-input').value = "";
    }

    function addChat(n, v) {
        const d = document.createElement('div');
        d.innerHTML = `<b style="color:var(--accent)">${n}:</b> ${v}`;
        const b = document.getElementById('chat-msgs');
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }

    function toggleMic() { myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('on'); }
    function toggleCam() { myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; document.getElementById('cam-btn').classList.toggle('on'); }

    function monitorAudio(s, bId, boxId) {
        const ctx = new AudioContext(); const src = ctx.createMediaStreamSource(s); const ana = ctx.createAnalyser();
        src.connect(ana); const data = new Uint8Array(ana.frequencyBinCount);
        const upd = () => {
            ana.getByteFrequencyData(data); const avg = data.reduce((a,b)=>a+b)/data.length;
            if(document.getElementById(bId)) document.getElementById(bId).style.width = (avg*2)+'%';
            if(document.getElementById(boxId)) document.getElementById(boxId).style.borderColor = avg > 15 ? 'var(--accent)' : '#333';
            requestAnimationFrame(upd);
        }; upd();
    }
</script>
</body>
</html>
